<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Chẩn đoán lỗi máy tính bằng hệ thống chuyên gia lai">
    <title>PC Doctor — Chẩn Đoán Thông Minh</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* ── Chat-specific styles ── */
        .chat-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 1rem 1.5rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        .chat-header {
            text-align: center;
            padding: 1rem 0;
            flex-shrink: 0;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 0;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            max-height: calc(100vh - 220px);
        }

        .chat-bubble {
            max-width: 85%;
            padding: 0.85rem 1.1rem;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.6;
            word-wrap: break-word;
            white-space: pre-line;
        }

        .chat-bubble.user {
            align-self: flex-end;
            background: var(--gradient-accent);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .chat-bubble.system {
            align-self: flex-start;
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
            box-shadow: var(--shadow-sm);
        }

        .chat-bubble.question {
            align-self: flex-start;
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid rgba(108, 99, 255, 0.25);
            border-bottom-left-radius: 4px;
            box-shadow: var(--shadow-md);
        }

        .chat-bubble.result {
            align-self: stretch;
            background: var(--bg-card);
            border: 2px solid rgba(0, 184, 148, 0.35);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            max-width: 100%;
        }

        .question-badge {
            display: inline-block;
            background: var(--gradient-accent);
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.2rem 0.6rem;
            border-radius: var(--radius-xl);
            margin-bottom: 0.5rem;
            letter-spacing: 0.05em;
        }

        .question-text-chat {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 0.75rem;
        }

        .chat-btn-group {
            display: flex;
            gap: 0.75rem;
            margin-top: 0.5rem;
        }

        .chat-btn {
            flex: 1;
            padding: 0.6rem 1rem;
            border: none;
            border-radius: var(--radius-xl);
            font-family: var(--font-primary);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-normal);
        }

        .chat-btn-yes {
            background: var(--gradient-btn-yes);
            color: white;
        }

        .chat-btn-yes:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,184,148,0.35); }

        .chat-btn-no {
            background: var(--gradient-btn-no);
            color: white;
        }

        .chat-btn-no:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(231,76,60,0.35); }

        .chat-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Input Area */
        .chat-input-area {
            flex-shrink: 0;
            padding: 1rem 0;
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            padding: 0.85rem 1.1rem;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-xl);
            font-family: var(--font-primary);
            font-size: 0.95rem;
            background: var(--bg-card);
            color: var(--text-primary);
            outline: none;
            transition: border-color var(--transition-fast);
        }

        .chat-input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.12);
        }

        .chat-input::placeholder {
            color: var(--text-muted);
        }

        .chat-send-btn {
            padding: 0.85rem 1.5rem;
            background: var(--gradient-btn-primary);
            color: white;
            border: none;
            border-radius: var(--radius-xl);
            font-family: var(--font-primary);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-normal);
            white-space: nowrap;
        }

        .chat-send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(108, 99, 255, 0.35);
        }

        .chat-send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Result card inside chat */
        .result-card-inner {
            text-align: left;
        }

        .result-card-inner .result-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.15rem;
        }

        .result-card-inner .result-value {
            font-weight: 600;
            margin-bottom: 0.75rem;
        }

        .result-card-inner .mini-stats {
            display: flex;
            gap: 1rem;
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border-light);
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .result-card-inner .mini-stat strong {
            color: var(--accent-primary);
        }

        /* Debug panel */
        .debug-panel {
            margin-top: 1rem;
            padding: 0.75rem;
            background: #f7f8fc;
            border: 1px solid rgba(240, 147, 43, 0.15);
            border-radius: var(--radius-md);
            font-family: var(--font-mono);
            font-size: 0.75rem;
            line-height: 1.7;
            color: var(--text-secondary);
            max-height: 300px;
            overflow-y: auto;
            display: none;
        }

        .debug-panel.visible { display: block; }

        .debug-toggle {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 0.3rem 0.8rem;
            border-radius: var(--radius-xl);
            font-size: 0.75rem;
            cursor: pointer;
            margin-top: 0.5rem;
            font-family: var(--font-primary);
        }

        .debug-toggle:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        /* Typing indicator */
        .typing-indicator {
            align-self: flex-start;
            padding: 0.5rem 1rem;
            display: none;
        }

        .typing-indicator.visible { display: flex; gap: 4px; align-items: center; }

        .typing-indicator span {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--accent-primary);
            animation: dotPulse 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0s; }

        /* Explanation panel */
        .explanation-section {
            margin-top: 1rem;
            padding: 0.75rem;
            background: rgba(108, 99, 255, 0.04);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            font-size: 0.85rem;
            display: none;
        }

        .explanation-section.visible { display: block; }

        .explanation-section h4 {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .explanation-section .step-item {
            padding: 0.25rem 0;
            border-bottom: 1px solid var(--border-light);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <div class="logo">
                <div class="logo-icon">🖥️</div>
                <span class="logo-text">PC Doctor</span>
            </div>
            <p class="header-subtitle">Chẩn Đoán Thông Minh</p>
        </div>

        <!-- Chat Messages -->
        <div class="chat-messages" id="chatMessages">
            <!-- Welcome message -->
            <div class="chat-bubble system">
                👋 Xin chào! Tôi là <strong>PC Doctor</strong>.<br>
                Hãy mô tả vấn đề máy tính của bạn, ví dụ:<br>
                <em>"Máy không lên nguồn, đèn không sáng"</em><br>
                <em>"Máy chạy chậm, quạt kêu to"</em><br>
                <em>"Không kết nối được wifi"</em>
            </div>
        </div>

        <!-- Typing indicator -->
        <div class="typing-indicator" id="typingIndicator">
            <span></span><span></span><span></span>
        </div>

        <!-- Input Area -->
        <div class="chat-input-area">
            <input type="text" class="chat-input" id="chatInput"
                   placeholder="Mô tả vấn đề máy tính của bạn..."
                   autocomplete="off">
            <button class="chat-send-btn" id="chatSendBtn" onclick="sendMessage()">
                Gửi ➤
            </button>
        </div>

        <!-- Footer -->
        <div class="footer" style="padding: 0.5rem 0;">
            <a href="{{ url_for('index') }}">← Trang chủ</a>
            &nbsp;|&nbsp;
            <a href="{{ url_for('diagnose') }}">📋 Chế độ hướng dẫn</a>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const chatSendBtn = document.getElementById('chatSendBtn');
        const typingIndicator = document.getElementById('typingIndicator');

        let currentQuestionCode = null;
        let isDone = false;

        // ── Send Message ──
        function sendMessage() {
            const text = chatInput.value.trim();
            if (!text || isDone) return;

            chatInput.value = '';
            // Include current question context so backend can interpret short answers
            const payload = { message: text };
            if (currentQuestionCode) {
                payload.question_code = currentQuestionCode;
            }
            sendToServer(payload);
        }

        // ── Send Answer (Yes/No button) ──
        function sendAnswer(value) {
            if (isDone) return;

            // Disable buttons
            document.querySelectorAll('.chat-btn').forEach(b => b.disabled = true);

            sendToServer({
                answer: value,
                question_code: currentQuestionCode
            });
        }

        // ── Send to Server ──
        async function sendToServer(payload) {
            chatSendBtn.disabled = true;
            chatInput.disabled = true;
            typingIndicator.classList.add('visible');
            scrollToBottom();

            try {
                const res = await fetch('/chat/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();

                if (data.error) {
                    if (data.redirect) {
                        window.location.href = data.redirect;
                    }
                    return;
                }

                // Render new messages
                renderMessages(data);

            } catch (err) {
                addBubble('system', '❌ Lỗi kết nối. Vui lòng thử lại.');
            } finally {
                typingIndicator.classList.remove('visible');
                chatSendBtn.disabled = isDone;
                chatInput.disabled = isDone;
                if (!isDone) chatInput.focus();
                scrollToBottom();
            }
        }

        // ── Render Messages from Server Response ──
        function renderMessages(data) {
            // Clear existing chat and re-render all messages
            const messages = data.messages || [];

            // Only render the last few new messages (avoid duplicates)
            chatMessages.innerHTML = '';

            // Re-add welcome message
            addBubble('system',
                '👋 Xin chào! Tôi là <strong>PC Doctor</strong>.<br>' +
                'Hãy mô tả vấn đề máy tính của bạn, ví dụ:<br>' +
                '<em>"Máy không lên nguồn, đèn không sáng"</em><br>' +
                '<em>"Máy chạy chậm, quạt kêu to"</em>');

            for (const msg of messages) {
                if (msg.role === 'user') {
                    addBubble('user', msg.text);
                } else if (msg.role === 'system') {
                    addBubble('system', msg.text);
                } else if (msg.role === 'question') {
                    addQuestionBubble(msg);
                } else if (msg.role === 'result') {
                    addResultBubble(msg);
                }
            }

            // Update state
            if (data.status === 'diagnosed' || data.status === 'no_match') {
                isDone = true;
                chatInput.disabled = true;
                chatSendBtn.disabled = true;
                chatInput.placeholder = 'Chẩn đoán hoàn tất';
            }

            scrollToBottom();
        }

        // ── Add simple bubble ──
        function addBubble(role, text) {
            const div = document.createElement('div');
            div.className = 'chat-bubble ' + role;
            div.innerHTML = text;
            chatMessages.appendChild(div);
        }

        // ── Add question bubble with buttons ──
        function addQuestionBubble(msg) {
            currentQuestionCode = msg.question_code;

            const div = document.createElement('div');
            div.className = 'chat-bubble question';

            const groupEmoji = getGroupEmoji(msg.group);

            div.innerHTML = `
                <span class="question-badge">${groupEmoji} ${getGroupLabel(msg.group)}</span>
                <div class="question-text-chat">${msg.text}</div>
                <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:0.5rem;">
                    ${msg.reason || ''} · ${msg.candidates_remaining || '?'} luật ứng viên
                </div>
                <div class="chat-btn-group">
                    <button class="chat-btn chat-btn-yes" onclick="sendAnswer('yes')">✅ Có</button>
                    <button class="chat-btn chat-btn-no" onclick="sendAnswer('no')">❌ Không</button>
                </div>
            `;

            chatMessages.appendChild(div);
        }

        // ── Add result bubble ──
        function addResultBubble(msg) {
            const d = msg.diagnosis;
            const div = document.createElement('div');
            div.className = 'chat-bubble result';

            let html = '<div class="result-card-inner">';

            if (d.rule_id) {
                html += `
                    <div style="text-align:center;margin-bottom:0.75rem;">
                        <span style="font-size:2.5rem;">🎯</span><br>
                        <span class="question-badge" style="background:linear-gradient(135deg,#00b894,#00a381);">Đã xác định nguyên nhân</span>
                    </div>
                    <div class="result-label">🔴 Nguyên nhân</div>
                    <div class="result-value">${d.cause}</div>
                    <div class="result-label">🟢 Giải pháp</div>
                    <div class="result-value">${d.solution}</div>
                    <div class="result-label">📋 Luật kích hoạt</div>
                    <div class="result-value">${d.rule_id}</div>
                    <div class="mini-stats">
                        <span>Câu hỏi: <strong>${d.questions_asked}</strong></span>
                        <span>Suy luận: <strong>${d.diagnosis_time_ms}ms</strong></span>
                        <span>Luật khớp: <strong>${d.all_matches_count}</strong></span>
                        <span>Nguồn: <strong>${d.decision_source}</strong></span>
                    </div>
                `;
            } else {
                html += `
                    <div style="text-align:center;margin-bottom:0.75rem;">
                        <span style="font-size:2.5rem;">🤔</span><br>
                        <span class="question-badge" style="background:linear-gradient(135deg,#f0932b,#e17e1e);">Không xác định được</span>
                    </div>
                    <div class="result-value">${d.cause}</div>
                    <div class="result-value" style="color:var(--text-secondary)">${d.solution}</div>
                `;
            }

            // Explanation toggle
            if (msg.explanation) {
                const expId = 'exp_' + Date.now();
                const dbgId = 'dbg_' + Date.now();
                html += `
                    <button class="debug-toggle" onclick="togglePanel('${expId}')">📝 Giải thích</button>
                    <button class="debug-toggle" onclick="togglePanel('${dbgId}')">🐞 Debug</button>
                    <div class="explanation-section" id="${expId}">
                        <h4>Quá trình suy luận</h4>
                        <p style="margin-bottom:0.5rem">${msg.explanation.summary}</p>
                        <h4>Sự kiện thu thập (${msg.explanation.facts_used.length})</h4>
                        ${msg.explanation.facts_used.map(f =>
                            '<div class="step-item">' + f.code + ': <strong>' + f.label + '</strong></div>'
                        ).join('')}
                        ${msg.explanation.reasoning_steps.length > 0 ? `
                            <h4>Các bước suy luận</h4>
                            ${msg.explanation.reasoning_steps.map(s =>
                                '<div class="step-item">' + s + '</div>'
                            ).join('')}
                        ` : ''}
                    </div>
                    <div class="debug-panel" id="${dbgId}">
                        <strong>Matched rules:</strong><br>
                        ${(msg.explanation.matched_rules || []).map(r =>
                            (r.is_selected ? '🏆' : '✅') + ' ' + r.rule_id + ' (P=' + r.priority + '): ' + r.cause
                        ).join('<br>') || '(none)'}
                        <br><br>
                        <strong>Rejected rules (top 10):</strong><br>
                        ${(msg.explanation.rejected_rules || []).slice(0,10).map(r =>
                            '❌ ' + r.rule_id + ' (' + r.conditions_met + '/' + r.conditions_total + ' met)'
                        ).join('<br>') || '(none)'}
                    </div>
                `;
            }

            html += '</div>';

            // Restart button
            html += `
                <div style="text-align:center;margin-top:1rem;">
                    <a href="/" class="btn btn-primary" style="display:inline-flex;">🔄 Chẩn đoán lại</a>
                </div>
            `;

            div.innerHTML = html;
            chatMessages.appendChild(div);
        }

        // ── Helpers ──
        function scrollToBottom() {
            setTimeout(() => {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }, 50);
        }

        function togglePanel(id) {
            const el = document.getElementById(id);
            if (el) el.classList.toggle('visible');
        }

        function getGroupEmoji(g) {
            const map = { power:'⚡', display:'🖥️', os:'💻', network:'🌐', performance:'📊', peripheral:'🔌' };
            return map[g] || '🔍';
        }

        function getGroupLabel(g) {
            const map = { power:'Nguồn điện', display:'Hiển thị', os:'Hệ điều hành', network:'Mạng', performance:'Hiệu năng', peripheral:'Ngoại vi' };
            return map[g] || g;
        }

        // ── Enter key ──
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Focus input on load
        chatInput.focus();
    </script>
</body>
</html>
